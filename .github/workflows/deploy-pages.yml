name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npx ng build --configuration production --base-href "/battleship/"

      - name: Detect output dir
        id: out
        run: |
          if ls -d dist/*/browser >/dev/null 2>&1; then
            echo "path=$(ls -d dist/*/browser | head -n1)" >> $GITHUB_OUTPUT
          else
            echo "path=$(ls -d dist/* | head -n1)" >> $GITHUB_OUTPUT
          fi
          echo "Using output path: ${{ steps.out.outputs.path }}"

      - name: SPA fallback
        run: cp "${{ steps.out.outputs.path }}/index.html" "${{ steps.out.outputs.path }}/404.html" || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.out.outputs.path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
