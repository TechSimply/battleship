name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Force "GitHub Actions" build type. In "deploy from a branch" mode,
      # GitHub's built-in Jekyll workflow also deploys on every push (it
      # renders README.md and the raw repo files) and races this workflow
      # for the site URL — whichever finishes last wins. Pinning the build
      # type kills that competing deployment for good.
      - name: Disable legacy branch (Jekyll) builds
        run: |
          curl -sfX PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}' \
            || echo "::warning::Could not set Pages build_type=workflow — set Settings > Pages > Source to 'GitHub Actions' manually"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npx ng build --configuration production --base-href "/battleship/"

      - name: Detect output dir
        id: out
        run: |
          if ls -d dist/*/browser >/dev/null 2>&1; then
            echo "path=$(ls -d dist/*/browser | head -n1)" >> $GITHUB_OUTPUT
          else
            echo "path=$(ls -d dist/* | head -n1)" >> $GITHUB_OUTPUT
          fi
          echo "Using output path: ${{ steps.out.outputs.path }}"

      - name: SPA fallback
        run: cp "${{ steps.out.outputs.path }}/index.html" "${{ steps.out.outputs.path }}/404.html" || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.out.outputs.path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
