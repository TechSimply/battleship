<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechSimply App Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #17324b 0%, #08131f 55%, #040a12 100%);
        color: #e9f4ff;
        display: grid;
        place-items: center;
        padding: 1.25rem;
      }

      main {
        width: min(30rem, 100%);
      }

      h1 {
        margin: 0 0 1.5rem;
        font-size: 1.5rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .apps {
        display: grid;
        gap: 0.9rem;
      }

      .app-link {
        display: block;
        text-decoration: none;
        color: inherit;
        background: rgba(13, 27, 44, 0.9);
        border: 1px solid rgba(96, 160, 210, 0.3);
        border-radius: 16px;
        padding: 1rem 1.1rem;
        transition: transform 120ms ease, border-color 120ms ease;
      }

      .app-link:hover,
      .app-link:focus-visible {
        transform: translateY(-1px);
        border-color: #4fd8eb;
        outline: none;
      }

      .name {
        display: block;
        font-weight: 700;
        font-size: 1.1rem;
      }

      .url {
        display: block;
        margin-top: 0.35rem;
        color: #8fc6e5;
        font-size: 0.9rem;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Web App Dashboard</h1>
      <section class="apps" aria-label="Applications">
        <a class="app-link" href="https://techsimply.github.io/battleship/" target="_blank" rel="noopener noreferrer">
          <span class="name">Battleship</span>
          <span class="url">https://techsimply.github.io/battleship/</span>
        </a>

        <a class="app-link" href="https://techsimply.github.io/stopwatch/" target="_blank" rel="noopener noreferrer">
          <span class="name">Stopwatch</span>
          <span class="url">https://techsimply.github.io/stopwatch/</span>
        </a>
      </section>
    </main>
  </body>
</html>
